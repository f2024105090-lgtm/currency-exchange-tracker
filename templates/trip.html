<!DOCTYPE html>
<html>
<head>
    <title>Trip Planner</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 40%;
            margin: auto;
            margin-top: 60px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid gray;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            background: #4facfe;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .back {
            text-align: center;
            margin-top: 20px;
        }

        .back a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Plan Your Journey ✈</h1>

    <form method="POST">

        <label>Destination</label>
        <input type="text" name="destination" placeholder="Enter country or city">

        <label>Travel Days</label>
        <input type="number" name="days" placeholder="Number of days">

        <label>Total Budget ($)</label>
        <input type="number" name="budget" placeholder="Enter budget">

        <button type="submit">Save Trip</button>

    </form>

    <div class="back">
        <a href="/">← Back to Dashboard</a>
    </div>

</div>

</body>
</html>
