<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flights Finder - TravelMate</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
color:white;
padding:40px;
display:flex;
justify-content:center;
align-items:flex-start;
}

.container{
width:100%;
max-width:750px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:35px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.45);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header i{
font-size:45px;
margin-bottom:15px;
color:#00c6ff;
}

.header h1{
font-size:34px;
}

.header p{
opacity:0.8;
margin-top:8px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.full{
grid-column:span 2;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

select,input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
outline:none;
font-size:15px;
background:rgba(255,255,255,0.12);
color:white;
backdrop-filter:blur(10px);
}

select option{
background:#203a43;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 20px rgba(0,198,255,0.5);
}

.result{
margin-top:30px;
padding:25px;
background:rgba(255,255,255,0.08);
border-radius:18px;
line-height:2;
}

.result h2{
margin-bottom:15px;
}

.back{
display:inline-block;
margin-top:25px;
color:#00c6ff;
text-decoration:none;
font-size:16px;
}

.back:hover{
text-decoration:underline;
}

@media(max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:span 1;
}

.container{
padding:25px;
}

.header h1{
font-size:28px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="header">
<i class="fa-solid fa-plane-departure"></i>
<h1>Flight Booking System</h1>
<p>Search live flights worldwide with smart airport selection</p>
</div>

<form action="/flights" method="POST">

<div class="form-grid">

<div>
<label>Departure Airport</label>
<select name="from_city" required>
<option value="LHE">Pakistan • Lahore (LHE)</option>
<option value="KHI">Pakistan • Karachi (KHI)</option>
<option value="ISB">Pakistan • Islamabad (ISB)</option>
<option value="IST">Turkey • Istanbul (IST)</option>
<option value="DXB">UAE • Dubai (DXB)</option>
<option value="KUL">Malaysia • Kuala Lumpur (KUL)</option>
<option value="JFK">USA • New York (JFK)</option>
<option value="LHR">UK • London (LHR)</option>
<option value="CDG">France • Paris (CDG)</option>
<option value="NRT">Japan • Tokyo (NRT)</option>
</select>
</div>

<div>
<label>Destination Airport</label>
<select name="to_city" required>
<option value="IST">Turkey • Istanbul (IST)</option>
<option value="LHE">Pakistan • Lahore (LHE)</option>
<option value="KHI">Pakistan • Karachi (KHI)</option>
<option value="ISB">Pakistan • Islamabad (ISB)</option>
<option value="DXB">UAE • Dubai (DXB)</option>
<option value="KUL">Malaysia • Kuala Lumpur (KUL)</option>
<option value="JFK">USA • New York (JFK)</option>
<option value="LHR">UK • London (LHR)</option>
<option value="CDG">France • Paris (CDG)</option>
<option value="NRT">Japan • Tokyo (NRT)</option>
</select>
</div>

<div>
<label>Travel Class</label>
<select name="class_type">
<option>Economy</option>
<option>Business</option>
<option>First Class</option>
</select>
</div>

<div>
<label>Passengers</label>
<input type="number" name="passengers" min="1" max="10" placeholder="Enter passengers" required>
</div>

</div>

<button type="submit">
<i class="fa-solid fa-magnifying-glass"></i> Search Flights
</button>

</form>

{% if flight_data %}
<div class="result">
<h2>Flight Details</h2>
<p>✈ Airline: {{ flight_data.airline }}</p>
<p>💰 Price: ${{ flight_data.price }}</p>
<p>⏳ Duration: {{ flight_data.duration }}</p>
</div>
{% endif %}

<a href="/dashboard" class="back">← Back to Dashboard</a>

</div>

</body>
</html>
