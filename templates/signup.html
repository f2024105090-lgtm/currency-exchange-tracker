<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - TravelMate</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
}

.background{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#00c6ff44,transparent),
radial-gradient(circle at bottom right,#ffffff22,transparent);
}

.signup-box{
position:relative;
width:450px;
padding:40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
color:white;
z-index:10;
}

.signup-box h1{
text-align:center;
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
}

.input-box label{
display:block;
margin-bottom:8px;
font-size:15px;
}

.input-box input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
outline:none;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#00c6ff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.bottom-links{
text-align:center;
margin-top:20px;
}

.bottom-links a{
color:#00c6ff;
text-decoration:none;
}

.home-link{
position:absolute;
top:20px;
left:20px;
color:white;
text-decoration:none;
font-size:18px;
}

</style>
</head>
<body>

<div class="background"></div>

<a href="/" class="home-link">
<i class="fa-solid fa-arrow-left"></i> Home
</a>

<div class="signup-box">

<h1><i class="fa-solid fa-user-plus"></i> Create Account</h1>

<form action="/signup" method="POST">

<div class="input-box">
<label>Username</label>
<input type="text" name="username" placeholder="Choose username" required>
</div>

<div class="input-box">
<label>Email</label>
<input type="email" name="email" placeholder="Enter email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" name="password" placeholder="Enter password" required>
</div>

<div class="input-box">
<label>Confirm Password</label>
<input type="password" name="confirm_password" placeholder="Confirm password" required>
</div>

<button type="submit">Create Account</button>

</form>

<div class="bottom-links">
<p>Already have an account? <a href="/login">Login</a></p>
</div>

</div>

</body>
</html>
