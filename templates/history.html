<!DOCTYPE html>
<html>
<head>
    <title>History</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        .card {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        .clear {
            background: red;
            color: white;
        }

        .back {
            background: gray;
            color: white;
        }
    </style>
</head>

<body>

<h1>Conversion History</h1>

<!-- CLEAR HISTORY BUTTON -->
<a href="/clear-history">
    <button class="btn clear">Clear History</button>
</a>

<a href="/">
    <button class="btn back">Back</button>
</a>

<br><br>

{% if records %}
    {% for record in records %}
        <div class="card">{{ record }}</div>
    {% endfor %}
{% else %}
    <p>No history found.</p>
{% endif %}

</body>
</html>
