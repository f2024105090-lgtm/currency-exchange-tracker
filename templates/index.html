<!DOCTYPE html>
<html>
<head>
    <title>Currency Exchange Tracker</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>💱 Currency Converter</h2>

    <form method="POST">

        <select name="from_currency">
            <option value="USD">USD</option>
            <option value="PKR">PKR</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR">INR</option>
        </select>

        <select name="to_currency">
            <option value="PKR">PKR</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="INR">INR</option>
        </select>

        <input type="number" name="amount" placeholder="Enter amount" required>

        <button type="submit">Convert</button>

        <a href="/history">
            <button type="button">View History</button>
        </a>

    </form>

    {% if live_rate %}
        <p>💱 1 {{ from_currency }} = {{ live_rate }} {{ to_currency }}</p>
    {% endif %}

    {% if result %}
        <div class="result">
            {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
