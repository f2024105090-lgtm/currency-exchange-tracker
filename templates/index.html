<!DOCTYPE html>
<html>
<head>
    <title>Currency Converter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        select, input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .convert-btn {
            background: #2a5298;
            color: white;
        }

        .convert-btn:hover {
            background: #1e3c72;
        }

        .history-btn {
            background: #555;
            color: white;
        }

        .history-btn:hover {
            background: #333;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }

        .rate {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="box">

    <h2>💱 Currency Converter</h2>

    <form method="POST">

        <select name="from_currency">
            {% for code in currencies.keys() %}
                <option value="{{ code }}">{{ code }}</option>
            {% endfor %}
        </select>

        <select name="to_currency">
            {% for code in currencies.keys() %}
                <option value="{{ code }}">{{ code }}</option>
            {% endfor %}
        </select>

        <input type="number" name="amount" placeholder="Enter amount" required>

        <button class="convert-btn" type="submit">Convert</button>

        <a href="/history">
            <button class="history-btn" type="button">View History</button>
        </a>

    </form>

    {% if live_rate %}
        <div class="rate">
            1 {{ from_currency }} = {{ live_rate }} {{ to_currency }}
        </div>
    {% endif %}

    {% if result %}
        <div class="result">
            {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
