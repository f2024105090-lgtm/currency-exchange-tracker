<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelMate</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    color:white;
    transition:0.4s;
}

body.light{
    background:linear-gradient(135deg,#f6f9fc,#ffffff,#dbeafe);
    color:black;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.nav-buttons button{
    padding:10px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-left:10px;
}

.hero{
    text-align:center;
    margin-top:40px;
}

.hero h1{
    font-size:55px;
}

.hero p{
    margin-top:15px;
    font-size:18px;
    opacity:0.8;
}

.container{
    width:90%;
    margin:auto;
    margin-top:50px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);
    padding:30px;
    border-radius:20px;
    box-shadow:0px 8px 25px rgba(0,0,0,0.3);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
}

.card h2{
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00c6ff;
    color:white;
    font-weight:bold;
}

.auth-box{
    width:400px;
    margin:auto;
    margin-top:100px;
    background:rgba(255,255,255,0.12);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    display:none;
}

.active{
    display:block;
}

.hidden{
    display:none;
}

.toggle-mode{
    cursor:pointer;
    font-size:22px;
}

@media(max-width:1000px){
    .container{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<div class="navbar">
    <div class="logo"><i class="fa-solid fa-plane"></i> TravelMate</div>

    <div class="nav-buttons">
        <button onclick="showLogin()">Login</button>
        <button onclick="showSignup()">Sign Up</button>
        <i class="fa-solid fa-moon toggle-mode" onclick="toggleMode()"></i>
    </div>
</div>

<div id="loginBox" class="auth-box">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
</div>

<div id="signupBox" class="auth-box">
    <h2>Sign Up</h2>
    <input type="text" placeholder="Username">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Create Account</button>
</div>

<div class="hero">
    <h1>Travel Smart, Travel Better</h1>
    <p>Your all-in-one intelligent travel planner</p>
</div>

<div class="container">

<div class="card">
    <h2><i class="fa-solid fa-money-bill-transfer"></i> Currency Converter</h2>
    <form action="/currency" method="POST">
        <input type="number" name="amount" placeholder="Amount">
        <select name="from_currency">
            <option>PKR</option>
            <option>USD</option>
            <option>EUR</option>
            <option>TRY</option>
        </select>
        <select name="to_currency">
            <option>USD</option>
            <option>PKR</option>
            <option>EUR</option>
            <option>TRY</option>
        </select>
        <button>Convert</button>
    </form>
</div>

<div class="card">
    <h2><i class="fa-solid fa-map-location-dot"></i> Trip Planner</h2>
    <form action="/trip" method="POST">
        <input type="text" name="destination" placeholder="Destination">
        <input type="number" name="days" placeholder="Days">
        <input type="number" name="budget" placeholder="Budget">
        <button>Save Trip</button>
    </form>
</div>

<div class="card">
    <h2><i class="fa-solid fa-wallet"></i> Budget Tracker</h2>
    <form action="/budget" method="POST">
        <input type="text" name="category" placeholder="Expense Category">
        <input type="number" name="amount" placeholder="Amount">
        <button>Add Expense</button>
    </form>
</div>

<div class="card">
    <h2><i class="fa-solid fa-suitcase"></i> Packing Assistant</h2>
    <form action="/packing" method="POST">
        <select name="trip_type">
            <option>winter</option>
            <option>summer</option>
            <option>normal</option>
        </select>
        <button>Generate</button>
    </form>
</div>

<div class="card">
    <h2><i class="fa-solid fa-book"></i> Travel Journal</h2>
    <form action="/journal" method="POST">
        <input type="text" name="title" placeholder="Journal Title">
        <textarea name="note" placeholder="Write your memories..."></textarea>
        <button>Save</button>
    </form>
</div>

<div class="card">
    <h2><i class="fa-solid fa-cloud-sun"></i> Weather Checker</h2>
    <form action="/weather" method="POST">
        <input type="text" name="city" placeholder="Enter city">
        <button>Check Weather</button>
    </form>
</div>

<div class="card">
    <h2><i class="fa-solid fa-clock-rotate-left"></i> History</h2>
    <a href="/history">
        <button>View History</button>
    </a>
</div>

</div>

<script>

function toggleMode(){
    document.body.classList.toggle("light");
}

function showLogin(){
    document.getElementById("loginBox").classList.toggle("active");
    document.getElementById("signupBox").classList.remove("active");
}

function showSignup(){
    document.getElementById("signupBox").classList.toggle("active");
    document.getElementById("loginBox").classList.remove("active");
}

</script>

</body>
</html>
